framework:
  default_timeout: 30000
  retry_count: 1
  log_level: INFO
  workers: auto

llm:
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  temperature: 0.3
  max_tokens: 8000
  timeout: 60000
  max_retries: 3

parser:
  use_llm: false
  default_format: "auto"   # auto / openapi / apifox / markdown
  output_dir: "output/parsed"

generator:
  use_llm: false
  output_dir: "output/testcases"
  group_by: "tag"          # tag / module / single

report:
  type: "allure"
  allure_dir: "output/reports/allure"
  attach_request: true
  attach_response: true
  attach_curl: true
